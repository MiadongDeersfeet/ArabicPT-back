# =====================================================
# ArabicPT 운영(prod) 프로파일
# 실행 시: java -jar app.jar --spring.profiles.active=prod
# 민감값은 이 파일에 직접 쓰지 말고 application-private.yml 또는
# 환경변수로 주입한다. (이 파일은 git에 올려도 안전)
# =====================================================

server:
  port: ${PORT:8081}          # NoorSchool 8080과 충돌 방지

spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-init-sql: "ALTER SESSION DISABLE PARALLEL DML"
      maximum-pool-size: 5

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://arabicpt.cloud,https://www.arabicpt.cloud}
  auth:
    cookie:
      secure: true
      same-site: None
      domain: arabicpt.cloud
    oauth2:
      success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:https://arabicpt.cloud/auth/callback}
      failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:https://arabicpt.cloud/auth/callback}
    jwt:
      issuer: ${JWT_ISSUER:arabicpt}
      secret: ${JWT_SECRET:}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXP_SECONDS:3600}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXP_SECONDS:1209600}
  audio:
    upload-dir: ${APP_AUDIO_UPLOAD_DIR:/home/opc/arabicpt/audio}
    public-path: ${APP_AUDIO_PUBLIC_PATH:/audio}

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY:}
  base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io}
  default-voice-id: ${ELEVENLABS_DEFAULT_VOICE_ID:}
  default-voice-name: ${ELEVENLABS_DEFAULT_VOICE_NAME:Salma}
  default-model-id: ${ELEVENLABS_DEFAULT_MODEL_ID:eleven_multilingual_v2}
  default-language-code: ${ELEVENLABS_DEFAULT_LANGUAGE_CODE:ar}
  output-format: ${ELEVENLABS_OUTPUT_FORMAT:mp3_44100_128}

logging:
  level:
    com.arabicpt: info
