spring:
  application:
    name: arabicpt-back
  config:
    import: optional:classpath:application-private.yml
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver

server:
  port: ${PORT:8080}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.arabicpt
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  audio:
    upload-dir: ${APP_AUDIO_UPLOAD_DIR:uploads/audio}
    public-path: ${APP_AUDIO_PUBLIC_PATH:/audio}

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY:}
  base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io}
  default-voice-id: ${ELEVENLABS_DEFAULT_VOICE_ID:}
  default-voice-name: ${ELEVENLABS_DEFAULT_VOICE_NAME:Sara}
  default-model-id: ${ELEVENLABS_DEFAULT_MODEL_ID:eleven_multilingual_v2}
  default-language-code: ${ELEVENLABS_DEFAULT_LANGUAGE_CODE:ar}
  output-format: ${ELEVENLABS_OUTPUT_FORMAT:mp3_44100_128}
