spring:
  application:
    name: arabicpt-back
  config:
    import: optional:classpath:application-private.yml
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver

server:
  port: ${PORT:8080}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.arabicpt
  configuration:
    map-underscore-to-camel-case: true

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email
        provider:
          google:
            user-name-attribute: sub

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth:
    cookie:
      refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:AP_REFRESH_TOKEN}
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${AUTH_COOKIE_DOMAIN:}
    oauth2:
      success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/callback}
      failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/auth/callback}
    jwt:
      issuer: ${JWT_ISSUER:arabicpt}
      secret: ${JWT_SECRET:change-this-secret-at-least-32-characters}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXP_SECONDS:3600}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXP_SECONDS:1209600}
  audio:
    upload-dir: ${APP_AUDIO_UPLOAD_DIR:uploads/audio}
    public-path: ${APP_AUDIO_PUBLIC_PATH:/audio}

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY:}
  base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io}
  default-voice-id: ${ELEVENLABS_DEFAULT_VOICE_ID:}
  default-voice-name: ${ELEVENLABS_DEFAULT_VOICE_NAME:Sara}
  default-model-id: ${ELEVENLABS_DEFAULT_MODEL_ID:eleven_multilingual_v2}
  default-language-code: ${ELEVENLABS_DEFAULT_LANGUAGE_CODE:ar}
  output-format: ${ELEVENLABS_OUTPUT_FORMAT:mp3_44100_128}
