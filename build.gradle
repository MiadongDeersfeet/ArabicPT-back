plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.5'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.arabicpt'
version = '0.0.1-SNAPSHOT'

// OneDrive 환경에서 build 폴더 잠금 이슈를 피하기 위한 출력 경로입니다.
layout.buildDirectory = layout.projectDirectory.dir(".gradle-build")

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:3.0.4'

    runtimeOnly 'com.oracle.database.jdbc:ojdbc11'
    runtimeOnly 'com.oracle.database.security:oraclepki'
    runtimeOnly 'com.oracle.database.security:osdt_core'
    runtimeOnly 'com.oracle.database.security:osdt_cert'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
